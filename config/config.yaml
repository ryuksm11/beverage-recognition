# ─────────────────────────────────────────────────────────────────────────────
# config.yaml — Single source of truth for the beverage-cnn project.
# Every module reads from this file via utils/config_loader.py.
# DO NOT hard-code any of these values elsewhere.
# ─────────────────────────────────────────────────────────────────────────────

# ─── Beverage classes (order defines class indices 0..N-1) ───────────────────
classes:
  - "Coca-Cola"
  - "Sprite"
  - "Pepsi"
  - "Maaza"
  - "Fanta"
  - "Red Bull"
  - "Tropicana"
  - "7UP"
  - "Mirinda"

# ─── Paths (all relative to project root) ────────────────────────────────────
paths:
  data_raw:        "data/raw"
  data_processed:  "data/processed"
  data_product_db: "data/product_db"
  data_segmented:  "data/segmented"    # rembg output — see scripts/segment_training_images.py
  data_backgrounds: "data/backgrounds" # indoor scenes — see scripts/download_backgrounds.py
  models:          "models"
  logs:            "logs"

# ─── Data download ───────────────────────────────────────────────────────────
download:
  images_per_class:       200     # target download count (expect ~20-30% noise)
  request_delay_sec:      2.0     # polite delay between requests
  image_extensions:
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".webp"

# ─── Dataset split ───────────────────────────────────────────────────────────
split:
  train_ratio: 0.70
  val_ratio:   0.15
  test_ratio:  0.15
  seed:        42

# ─── Augmentation ────────────────────────────────────────────────────────────
augmentation:
  image_size:   224          # final crop size (EfficientNet-B0 default)
  resize_to:    256          # resize before center/random crop
  # ImageNet normalization — used for both train and eval
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  # Probability of pasting segmented bottle onto random background (requires data/segmented + data/backgrounds)
  background_paste_prob: 0.70
  # Train-only augmentation parameters (Albumentations pipeline)
  train:
    random_rotation_deg:    15
    color_jitter_brightness: 0.3
    color_jitter_contrast:   0.3
    color_jitter_saturation: 0.3
    color_jitter_hue:        0.1
    horizontal_flip_prob:    0.5
    # Perspective — simulate off-axis phone camera angle
    random_perspective_distortion:  0.2
    random_perspective_prob:        0.5
    # Shift — simulate off-center framing
    random_shift_limit:             0.1
    # GaussianBlur — simulate camera defocus
    gaussian_blur_prob:             0.30
    # RandomGrayscale — prevent over-reliance on brand color
    random_grayscale_prob:          0.15
    # ── Real-world simulation (v2) ──────────────────────────────────
    # RandomShadow — simulate uneven indoor/outdoor lighting
    random_shadow_prob:             0.30
    # MotionBlur — simulate camera shake
    motion_blur_prob:               0.20
    motion_blur_limit:              7     # max kernel size (must be odd)
    # CoarseDropout — simulate partial occlusion (hand, sticker, glare)
    coarse_dropout_prob:            0.30
    coarse_dropout_holes:           4
    coarse_dropout_size:            32    # max hole height/width in pixels

# ─── Model ───────────────────────────────────────────────────────────────────
model:
  architecture: "efficientnet_b0"   # timm model name
  pretrained:   true
  # num_classes is derived from len(classes) at runtime — do not set here

# ─── Training ────────────────────────────────────────────────────────────────
training:
  seed:            42
  batch_size:      32
  num_workers:     4          # DataLoader workers (set to 0 on Windows if issues)
  pin_memory:      true

  # Phase 1: train classifier head only (base frozen)
  phase1:
    num_epochs:    20
    lr:            1.0e-3
    weight_decay:  1.0e-4

  # Phase 2: unfreeze last N blocks, fine-tune with lower LR
  phase2:
    num_epochs:    20
    lr:            1.0e-4
    weight_decay:  1.0e-4
    unfreeze_last_n_blocks: 3

  # Loss
  label_smoothing: 0.05      # reduced from 0.1 — too aggressive for small dataset head training

  # Early stopping (applied to val loss)
  early_stopping:
    patience:      7
    min_delta:     0.001

  # Checkpoints
  checkpoint_filename:    "best_checkpoint_v2.pth"  # active model (background aug + albumentations, 87.23% test acc)
  checkpoint_filename_v2: "best_checkpoint_v2.pth"  # retrained with background aug

# ─── Evaluation gates (training considered passing only if met) ───────────────
evaluation_gates:
  min_val_accuracy_phase1: 0.45   # after phase 1 (head-only; base frozen — ceiling is ~0.50 on this dataset size)
  min_val_accuracy_phase2: 0.80   # after phase 2
  min_per_class_f1:        0.65   # for every class

# ─── Inference ───────────────────────────────────────────────────────────────
inference:
  confidence_threshold:    0.60   # below this → "Low confidence" warning in UI
  top_k:                   3      # how many top predictions to return
  tta_n:                   5      # number of TTA augmented passes to average
  entropy_rejection_ratio: 0.75   # entropy/max_entropy above this → OOD rejection

# ─── Retrieval ───────────────────────────────────────────────────────────────
retrieval:
  fuzzy_threshold: 80           # thefuzz score threshold (0-100)

# ─── Scraper ─────────────────────────────────────────────────────────────────
scraper:
  request_delay_sec:  1.5
  user_agent: "Mozilla/5.0 (compatible; beverage-cnn-research/1.0)"
  openfoodfacts_api: "https://world.openfoodfacts.org/cgi/search.pl"
